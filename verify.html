<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>এন্ট্রি কন্ট্রোল প্যানেল | প্রাক্তন শিক্ষার্থী পরিষদ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Hind Siliguri', sans-serif; 
            background: linear-gradient(145deg, #f6f9fc 0%, #f1f5f9 100%);
            color: #0f172a;
            min-height: 100vh;
            padding: 12px;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 32, 64, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .stats-card {
            background: white;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 8px 20px -10px rgba(0, 0, 0, 0.05);
            border: 1px solid #edf2f7;
        }

        .stats-number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .token-input-group {
            background: #ffffff;
            border-radius: 40px;
            padding: 4px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
        }

        .token-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 16px 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2563eb;
            outline: none;
            font-family: 'Hind Siliguri', sans-serif;
        }

        .token-button {
            background: #0f172a;
            color: white;
            border-radius: 36px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .member-info-card {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2563eb;
        }

        .status-alert {
            border-radius: 24px;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .status-alert.warning {
            background: #fff3e0;
            color: #ef6c00;
            border: 1px solid #ffcc80;
        }

        .action-button {
            background: #2563eb;
            color: white;
            border-radius: 28px;
            padding: 18px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-button.secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .log-item {
            background: white;
            border-radius: 20px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #edf2f7;
            margin-bottom: 8px;
        }

        .log-time {
            font-size: 0.7rem;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden-content { display: none; }
    </style>
</head>
<body>

    <!-- লগইন সেকশন -->
    <div id="loginArea" class="max-w-md mx-auto mt-20">
        <div class="premium-card p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-shield-alt text-3xl text-indigo-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">অ্যাডমিন অ্যাক্সেস</h2>
                <p class="text-sm text-slate-500 mt-1">ভেরিফিকেশন প্যানেলে প্রবেশ করুন</p>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="adminPass" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:bg-white outline-none text-center" placeholder="পাসওয়ার্ড">
                <button onclick="checkLogin()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-4 rounded-2xl font-bold hover:shadow-xl transition shadow-lg">
                    লগইন করুন
                </button>
            </div>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট -->
    <div id="mainContent" class="max-w-md mx-auto hidden-content">
        
        <!-- নেভি বার -->
        <div class="bg-white/90 backdrop-blur-xl rounded-2xl p-4 mb-4 shadow-lg border border-gray-100">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-xs"></i>
                    </div>
                    <span class="font-bold text-slate-800 text-sm">এন্ট্রি কন্ট্রোল প্যানেল</span>
                </div>
                <button onclick="logout()" class="w-9 h-9 bg-red-50 text-red-500 rounded-xl flex items-center justify-center border border-red-100">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>
        </div>

        <!-- স্ট্যাটস কার্ড -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="stats-card">
                <div class="text-xs text-slate-400">মোট রেজিস্টার্ড</div>
                <div class="stats-number text-slate-800" id="statTotal">0</div>
            </div>
            <div class="stats-card border-l-4 border-l-green-500">
                <div class="text-xs text-slate-400">উপস্থিত</div>
                <div class="stats-number text-green-600" id="statPresent">0</div>
            </div>
        </div>

        <!-- টোকেন ভেরিফিকেশন -->
        <div class="premium-card p-6 mb-4">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-qrcode text-indigo-600"></i>
                মেম্বার ভেরিফিকেশন
            </h2>

            <div class="token-input-group mb-4">
                <input type="text" id="verifyToken" class="token-input" placeholder="টোকেন দিন (যেমন: DBHS-2546)">
                <button onclick="searchMember()" id="searchBtn" class="token-button">
                    <i class="fas fa-search mr-1"></i> চেক
                </button>
            </div>

            <div id="loader" class="hidden">
                <div class="loader"></div>
            </div>

            <div id="resultArea" class="hidden">
                <div id="statusAlert" class="status-alert mb-4"></div>

                <div class="member-info-card mb-4">
                    <div class="info-row">
                        <div class="info-icon"><i class="fas fa-user"></i></div>
                        <div>
                            <div class="text-xs text-gray-400">সদস্যের নাম</div>
                            <div class="font-bold text-slate-800" id="resName">-</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-icon"><i class="fas fa-calendar"></i></div>
                        <div>
                            <div class="text-xs text-gray-400">পাসের সাল</div>
                            <div class="font-bold text-slate-800" id="resPassYear">-</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                        <div>
                            <div class="text-xs text-gray-400">মোবাইল</div>
                            <div class="font-bold text-slate-800" id="resMobile">-</div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-icon"><i class="fas fa-ticket-alt"></i></div>
                        <div>
                            <div class="text-xs text-gray-400">ইভেন্ট</div>
                            <div class="font-bold text-slate-800" id="resEvent">-</div>
                        </div>
                    </div>
                </div>

                <div id="actionArea" class="space-y-3"></div>
            </div>
        </div>

        <!-- সাম্প্রতিক এন্ট্রি লগ -->
        <div class="premium-card p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold flex items-center gap-2">
                    <i class="fas fa-history text-indigo-600"></i>
                    সাম্প্রতিক এন্ট্রি
                </h3>
                <span class="text-[10px] bg-green-100 text-green-600 px-3 py-1 rounded-full font-semibold">
                    <i class="fas fa-circle text-[6px] mr-1"></i> লাইভ
                </span>
            </div>
            <div id="entryLog" class="space-y-2 max-h-[300px] overflow-y-auto">
                <div class="text-center text-sm text-slate-400 py-6">
                    <i class="fas fa-clock mr-2"></i> এখনো কেউ প্রবেশ করেনি
                </div>
            </div>
        </div>
    </div>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwg4wBbtvWiF0Zd9zzQfzQtd7aSZvgCNaCZ6GjMd5d8pnHfvfD6AS11mi1p77C6LFrF/exec';
        const MASTER_PASS = "ADMIN123"; 
        let currentData = null;
        let entryHistory = [];

        window.onload = function() {
            if (sessionStorage.getItem('entryAccess') === 'granted') {
                showMainContent();
            }
        };

        function checkLogin() {
            const passInput = document.getElementById('adminPass').value;
            if (passInput === MASTER_PASS) {
                sessionStorage.setItem('entryAccess', 'granted');
                showMainContent();
            } else {
                alert("❌ ভুল পাসওয়ার্ড!");
            }
        }

        function showMainContent() {
            document.getElementById('loginArea').classList.add('hidden-content');
            document.getElementById('mainContent').classList.remove('hidden-content');
        }

        function logout() {
            sessionStorage.removeItem('entryAccess');
            location.reload();
        }

        async function searchMember() {
            const token = document.getElementById('verifyToken').value.trim();
            const resArea = document.getElementById('resultArea');
            const loader = document.getElementById('loader');
            
            if (!token) {
                showNotification('টোকেন দিন', 'warning');
                return;
            }

            resArea.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`${scriptURL}?action=search&token=${token}`);
                const result = await response.json();
                
                loader.classList.add('hidden');
                resArea.classList.remove('hidden');

                if (result.result === 'success') {
                    document.getElementById('statTotal').innerText = result.stats?.total || 0;
                    document.getElementById('statPresent').innerText = result.stats?.present || 0;
                    document.getElementById('resName').innerText = result.data.name || '—';
                    document.getElementById('resPassYear').innerText = result.data.passYear || '—';
                    document.getElementById('resMobile').innerText = result.data.mobile || '—';
                    document.getElementById('resEvent').innerText = result.data.event || '—';
                    
                    currentData = result.data;

                    const alertBox = document.getElementById('statusAlert');
                    const actionArea = document.getElementById('actionArea');

                    if (result.data.status === "Present") {
                        alertBox.className = "status-alert warning";
                        alertBox.innerHTML = "<i class='fas fa-exclamation-triangle'></i> এই মেম্বার আগেই প্রবেশ করেছেন!";
                        actionArea.innerHTML = `
                            <button onclick="resetUI()" class="action-button secondary">
                                <i class="fas fa-times mr-2"></i> বন্ধ করুন
                            </button>`;
                    } else {
                        alertBox.className = "status-alert success";
                        alertBox.innerHTML = "<i class='fas fa-check-circle'></i> বৈধ সদস্য। প্রবেশ করান?";
                        
                        actionArea.innerHTML = `
                            <button onclick="confirmEntry()" class="action-button">
                                <i class="fas fa-check mr-2"></i> প্রবেশ মার্ক করুন
                            </button>
                            <button onclick="resetUI()" class="action-button secondary mt-2">
                                <i class="fas fa-arrow-left mr-2"></i> ফিরে যান
                            </button>`;
                        
                        document.getElementById('beep').play();
                    }
                } else {
                    showNotification('❌ সদস্য পাওয়া যায়নি!', 'error');
                    resArea.classList.add('hidden');
                }
            } catch (e) {
                showNotification('সার্ভার সমস্যা!', 'error');
                loader.classList.add('hidden');
            }
        }

        async function confirmEntry() {
            if (!currentData) return;
            
            document.getElementById('actionArea').innerHTML = `
                <div class="text-center py-4">
                    <div class="loader mx-auto mb-3"></div>
                    <p class="text-sm text-indigo-600">প্রসেসিং...</p>
                </div>`;
            
            try {
                const response = await fetch(`${scriptURL}?action=mark_entry&token=${currentData.token}`);
                const result = await response.json();
                
                if (result.result === 'marked' || result.result === 'success') {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
                    updateEntryLog(currentData.name, timeStr);
                    
                    const presentCount = parseInt(document.getElementById('statPresent').innerText) + 1;
                    document.getElementById('statPresent').innerText = presentCount;
                    
                    showNotification('✅ এন্ট্রি সফল হয়েছে!', 'success');
                    resetUI();
                } else {
                    showNotification('❌ এন্ট্রি ব্যর্থ হয়েছে', 'error');
                    resetUI();
                }
            } catch (e) {
                showNotification('সার্ভার সমস্যা!', 'error');
                resetUI();
            }
        }

        function updateEntryLog(name, time) {
            const logSection = document.getElementById('entryLog');
            entryHistory.unshift({ name, time });
            if (entryHistory.length > 5) entryHistory.pop();
            
            if (entryHistory.length === 0) {
                logSection.innerHTML = '<div class="text-center text-sm text-slate-400 py-6"><i class="fas fa-clock mr-2"></i>এখনো কেউ প্রবেশ করেনি</div>';
            } else {
                logSection.innerHTML = entryHistory.map(item => `
                    <div class="log-item">
                        <span class="font-semibold text-slate-700">${item.name}</span>
                        <span class="log-time">${item.time}</span>
                    </div>
                `).join('');
            }
        }

        function showNotification(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `fixed top-4 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl text-sm font-semibold shadow-lg text-white`;
            
            if (type === 'success') alertDiv.classList.add('bg-green-500');
            else if (type === 'error') alertDiv.classList.add('bg-red-500');
            else alertDiv.classList.add('bg-orange-500');
            
            alertDiv.innerHTML = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 2000);
        }

        function resetUI() {
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('verifyToken').value = '';
            document.getElementById('verifyToken').focus();
            currentData = null;
        }

        document.getElementById('verifyToken').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMember();
        });
    </script>
</body>
</html>
